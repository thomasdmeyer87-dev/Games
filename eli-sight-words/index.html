<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eli Sight Word Game</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-card">
      <h1>Eli Sight Words</h1>
      <p class="subtitle">Tap the word that matches the big word.</p>

      <div class="score-row">
        <span>Correct: <span id="correctCount">0</span></span>
        <span>Try: <span id="tryCount">0</span></span>
      </div>

      <div class="word-display" id="targetWord">the</div>
      <div class="option-grid" id="options"></div>
      <p id="feedback" class="feedback"></p>

      <div class="controls">
        <button class="big-button orange" onclick="newRound()">Next Word</button>
      </div>

      <a class="small-link" href="../">Back to Practice Hub</a>
    </section>
  </main>

  <script>
    const words = ["the", "and", "you", "said", "was", "for", "are", "with", "his", "they", "this", "have"];
    let target = "";
    let correct = 0;
    let tries = 0;

    function shuffle(array) {
      return array.sort(() => Math.random() - 0.5);
    }

    function newRound() {
      document.getElementById("feedback").textContent = "";
      target = words[Math.floor(Math.random() * words.length)];
      document.getElementById("targetWord").textContent = target;

      let choices = [target];
      while (choices.length < 4) {
        const word = words[Math.floor(Math.random() * words.length)];
        if (!choices.includes(word)) choices.push(word);
      }

      choices = shuffle(choices);
      const options = document.getElementById("options");
      options.innerHTML = "";

      choices.forEach(word => {
        const button = document.createElement("button");
        button.className = "big-button purple";
        button.textContent = word;
        button.onclick = () => checkAnswer(word);
        options.appendChild(button);
      });
    }

    function checkAnswer(word) {
      tries += 1;
      document.getElementById("tryCount").textContent = tries;

      if (word === target) {
        correct += 1;
        document.getElementById("correctCount").textContent = correct;
        document.getElementById("feedback").textContent = "Great job!";
      } else {
        document.getElementById("feedback").textContent = "Try again.";
      }
    }

    newRound();
  </script>
</body>
</html>
