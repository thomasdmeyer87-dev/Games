<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Evan - ELA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/styles.css" />

  <style>
    .page-title {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      font-size: 2.5rem;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 700px) {
      .columns {
        grid-template-columns: 1fr 1fr;
      }
    }

    .column {
      background: rgba(255,255,255,0.95);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    .column h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .game-button {
      display: block;
      width: 100%;
      margin: 12px 0;
      padding: 18px;
      border-radius: 16px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 1.3rem;
      text-align: center;
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    }

    .back {
      display: block;
      margin-top: 25px;
      text-align: center;
      color: white;
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <h1 class="page-title">Evan - ELA</h1>

  <div class="columns">

    <!-- Vocabulary Column -->

      <h2>Vocabulary</h2>

      <a class="game-button" href="../evan-vocab-3/index.html">

</html>
