<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kids Practice Hub</title>
  <link rel="stylesheet" href="assets/styles.css" />
  <link rel="manifest" href="manifest.json" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <p class="eyebrow">Meyer Practice</p>
      <h1>What do you want to practice?</h1>
      <p class="subtitle">Pick your name, then choose a game.</p>
    </section>

    <section class="kid-grid">
      <article class="kid-card evan-card">
        <div class="avatar">E</div>
        <h2>Evan</h2>
        <p>Vocabulary, reading, and more.</p>
        <a class="big-button green" href="evan-vocabulary/">Vocabulary Game</a>
      </article>

      <article class="kid-card eli-card">
        <div class="avatar">E</div>
        <h2>Eli</h2>
        <p>Sight words, recognition, and more.</p>
        <a class="big-button blue" href="eli-sight-words/">Sight Word Game</a>
      </article>
    </section>
  </main>
</body>
</html>
