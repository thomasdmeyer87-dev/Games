<!DOCTYPE html>
<html>
<head>
  <title>Homework Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #6dd5ed, #2193b0);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 400px;
    }

    h1 {
      color: white;
      font-size: 32px;
      margin-bottom: 30px;
    }

    .button {
      display: block;
      margin: 15px auto;
      padding: 25px;
      width: 80%;
      font-size: 28px;
      font-weight: bold;
      border-radius: 20px;
      text-decoration: none;
      color: white;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .evan {
      background-color: #4CAF50;
    }

    .eli {
      background-color: #2196F3;
    }

    .button:active {
      transform: scale(0.97);
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Homework Practice</h1>

    <a class="button evan" href="evan/index.html">Evan</a>
    <a class="button eli" href="eli/index.html">Eli</a>
  </div>
</body>
</html>
