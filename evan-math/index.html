<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evan Vocabulary Game</title>
  <link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-card">
      <h1>Evan Vocabulary</h1>
      <p class="subtitle">Read the word, say what it means, then check yourself.</p>

      <div class="score-row">
        <span>Card <span id="cardNumber">1</span></span>
        <span>Correct: <span id="correctCount">0</span></span>
      </div>

      <div class="word-display" id="wordDisplay">brave</div>
      <p id="definition" class="feedback"></p>

      <div class="controls">
        <button class="big-button blue" onclick="showDefinition()">Show Meaning</button>
        <button class="big-button green" onclick="markCorrect()">I Got It</button>
        <button class="big-button orange" onclick="nextWord()">Next Word</button>
      </div>

      <a class="small-link" href="../">Back to Practice Hub</a>
    </section>
  </main>

  <script>
    const words = [
      { word: "brave", definition: "showing courage" },
      { word: "curious", definition: "wanting to learn or know more" },
      { word: "gentle", definition: "kind and careful" },
      { word: "honest", definition: "telling the truth" },
      { word: "patient", definition: "able to wait calmly" },
      { word: "focus", definition: "to pay close attention" },
      { word: "effort", definition: "hard work or trying your best" },
      { word: "respect", definition: "showing care for someone or something" }
    ];

    let index = 0;
    let correct = 0;

    function updateCard() {
      document.getElementById("wordDisplay").textContent = words[index].word;
      document.getElementById("definition").textContent = "";
      document.getElementById("cardNumber").textContent = index + 1;
      document.getElementById("correctCount").textContent = correct;
    }

    function showDefinition() {
      document.getElementById("definition").textContent = words[index].definition;
    }

    function markCorrect() {
      correct += 1;
      document.getElementById("correctCount").textContent = correct;
      document.getElementById("definition").textContent = "Nice job!";
    }

    function nextWord() {
      index = (index + 1) % words.length;
      updateCard();
    }

    updateCard();
  </script>
</body>
</html>
